<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ISO 27001 導入文件生成系統{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans antialiased">

    <!-- Top Navigation -->
    <nav class="bg-indigo-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center gap-2 text-white font-bold text-xl tracking-wide">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>ISO 27001 Auto-Generator</span>
                    </a>
                </div>
                <div class="flex items-center">
                    <span class="text-indigo-100 text-sm hidden md:block">無痛導入文件自動化生成平台</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-5xl mx-auto py-8 px-4 sm:px-6 lg:px-8 min-h-[calc(100vh-8rem)]">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-gray-500">
                &copy; 2026 ISO 27001 ISMS System Core Engine. All rights reserved.
            </p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
